<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu Reservasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-violet: #7b2cbf;
            --light-violet: #e0b1cb;
            --dark-violet: #3c096c;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #240046;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #c77dff, #5a189a);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
        }

        /* Glassmorphism Container */
        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* --- Top Section: Stats & Messages --- */
        .top-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            padding: 15px 30px;
            text-align: center;
            flex: 1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--glass-border);
        }

        .stat-number {
            display: block;
            font-size: 2rem;
            font-weight: 600;
            color: var(--dark-violet);
        }

        .stat-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-color);
        }

        .messages-container {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
        }

        /* Custom Scrollbar */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background-color: var(--primary-violet);
            border-radius: 10px;
        }

        .message-card {
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 5px solid var(--primary-violet);
            animation: fadeIn 0.5s ease;
        }

        .message-card.tidak-hadir {
            border-left-color: #9d4edd;
            opacity: 0.8;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .message-name {
            font-weight: 600;
            color: var(--dark-violet);
        }

        .message-badge {
            background: var(--light-violet);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            color: rgba(36, 0, 70, 0.6);
            font-style: italic;
            margin-top: 50px;
        }

        /* --- Bottom Section: Form --- */
        .form-section {
            background: rgba(255, 255, 255, 0.3);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .header-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-title h1 {
            font-family: 'Playfair Display', serif;
            color: var(--dark-violet);
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        .header-title p {
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--primary-violet);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: var(--primary-violet);
            box-shadow: 0 0 0 3px rgba(123, 44, 191, 0.2);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            background: rgba(255, 255, 255, 0.5);
            padding: 12px 15px;
            border-radius: 10px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        button.btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary-violet);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        button.btn-submit:hover {
            background: var(--dark-violet);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
                gap: 30px;
            }

            .stats-container {
                flex-direction: row; /* Tetap bersampingan di mobile agar rapi */
            }

            .stat-box {
                padding: 10px;
            }

            .stat-number {
                font-size: 1.5rem;
            }

            .header-title h1 {
                font-size: 2rem;
            }

            .radio-group {
                flex-direction: column;
                gap: 10px;
            }

            .form-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-section">
            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-number" id="countHadir">0</span>
                    <span class="stat-label">Hadir</span>
                </div>
                <div class="stat-box">
                    <span class="stat-number" id="countTidakHadir">0</span>
                    <span class="stat-label">Tidak Hadir</span>
                </div>
            </div>

            <div class="messages-container" id="messageList">
                <p class="empty-state" id="emptyState">Belum ada ucapan. Jadilah yang pertama!</p>
                </div>
        </div>

        <div class="form-section">
            <div class="header-title">
                <h1>Reservasi</h1>
                <p>Buku Tamu</p>
            </div>

            <form id="guestbookForm">
                <div class="input-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama Anda" required>
                </div>

                <div class="input-group">
                    <label>Pilihan Kehadiran</label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="kehadiran" value="Hadir" required> Hadir
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="kehadiran" value="Tidak Hadir" required> Tidak Hadir
                        </label>
                    </div>
                </div>

                <div class="input-group">
                    <label for="ucapan">Ucapan & Doa</label>
                    <textarea id="ucapan" rows="4" placeholder="Tuliskan pesan, ucapan, atau doa Anda di sini..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Kirim Ucapan</button>
            </form>
        </div>
    </div>

    <script>
        // Inisialisasi variabel statistik
        let totalHadir = 0;
        let totalTidakHadir = 0;

        // Ambil elemen DOM
        const form = document.getElementById('guestbookForm');
        const messageList = document.getElementById('messageList');
        const emptyState = document.getElementById('emptyState');
        const countHadirEl = document.getElementById('countHadir');
        const countTidakHadirEl = document.getElementById('countTidakHadir');

        // Event Listener saat form dikirim
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah reload halaman

            // Ambil nilai dari input
            const nama = document.getElementById('nama').value;
            const kehadiran = document.querySelector('input[name="kehadiran"]:checked').value;
            const ucapan = document.getElementById('ucapan').value;

            // Update statistik
            if (kehadiran === 'Hadir') {
                totalHadir++;
                countHadirEl.textContent = totalHadir;
            } else {
                totalTidakHadir++;
                countTidakHadirEl.textContent = totalTidakHadir;
            }

            // Hapus teks "Belum ada ucapan" jika ini pesan pertama
            if (emptyState) {
                emptyState.style.display = 'none';
            }

            // Buat elemen HTML untuk pesan baru
            const messageCard = document.createElement('div');
            // Tambahkan class khusus jika tidak hadir untuk styling yang sedikit berbeda (opsional)
            messageCard.className = `message-card ${kehadiran === 'Tidak Hadir' ? 'tidak-hadir' : ''}`;
            
            messageCard.innerHTML = `
                <div class="message-header">
                    <span class="message-name">${nama}</span>
                    <span class="message-badge">${kehadiran}</span>
                </div>
                <div class="message-text">${ucapan}</div>
            `;

            // Tambahkan pesan ke paling atas (prepend)
            messageList.prepend(messageCard);

            // Reset form setelah sukses dikirim
            form.reset();
        });
    </script>
</body>
</html>
